# Build and (optionally) deploy the LLM-Wiki dogfood demo.
#
# Compiles LLM-Wiki against its own source tree using the default
# deterministic extractor (no LLM calls, no API keys required) and
# builds the static site. The site is uploaded as a regular workflow
# artifact (so it is always inspectable from the Actions tab) and,
# when GitHub Pages is enabled for the repository, ALSO deployed to
# Pages.
#
# The Pages-related steps are intentionally non-fatal:
#   • The default GITHUB_TOKEN granted to workflows cannot CREATE a
#     Pages site programmatically — only deploy to one that already
#     exists. So the very first deploy needs a one-time manual flip
#     at Settings → Pages → Source: GitHub Actions.
#   • Until that toggle is on, configure-pages / upload-pages-artifact /
#     deploy-pages will fail with "Resource not accessible by integration".
#   • Rather than making the whole CI red, those steps are marked
#     continue-on-error so the build itself stays green and the
#     static site is still produced as a downloadable artifact.
#
# Manual dispatch (workflow_dispatch) is reserved for future LLM-enabled
# rebuilds; the push path is fully offline.
name: build-demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Compile dogfood wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install LLM-Wiki (editable, synthesis-llm extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[synthesis-llm]"

      - name: Setup project (no Cognee, no RAG-Anything)
        # `setup --yes` writes .llm-wiki/config.json non-interactively.
        # Every companion tool that would need network or LLM credentials
        # is disabled so the default compile path is fully offline.
        #
        # `--source` is repeatable (action="append" in llm_wiki/cli.py).
        # We pass the repo root AND the demo corpus tree so the deploy
        # contains both the LLM-Wiki dogfood (`.`) and the 3D-reconstruction
        # showcase corpus (50 papers, 12 repos, 6 daily digests, 2 weekly
        # syntheses, 3 open questions) seeded under examples/demo-corpus/data/.
        #
        # The .agent-sessions/ transcripts under examples/demo-corpus/
        # are intentionally NOT passed as a source: the harness session
        # importer (llm_wiki/harness_sessions.py) only ingests native
        # Claude Code / Codex JSONL formats, not the synthetic showcase
        # format. Instead, those five transcripts are pre-converted to
        # harness-native HarnessSession JSON under
        # examples/demo-corpus/.harness-sessions/ and seeded into the
        # harness session store by the "Seed demo agent sessions" step
        # below, so the build-site step renders them under /sessions/.
        run: |
          python -m llm_wiki project setup \
            --yes \
            --no-color \
            --source-kind Repository \
            --source . \
            --source examples/demo-corpus/data \
            --no-cognee \
            --skip-raganything \
            --skip-install-cognee \
            --skip-install-raganything \
            --skip-install-understand-anything

      - name: Compile (deterministic extractor, no LLM calls)
        # The default ResearchGraphExtractor is fully deterministic: it
        # builds the typed graph from filesystem walks + heuristics, with
        # zero outbound network or LLM calls. See llm_wiki/research_graph.py.
        run: python -m llm_wiki project compile

      - name: Restore seeded RAG-Anything store
        # The 85-doc demo corpus was pre-ingested through LightRAG + Codex
        # locally and committed under examples/demo-corpus/raganything-store/.
        # Copy it into the runtime working_dir so a downstream consumer
        # (the workflow's raganything-store artifact, or anyone running
        # `llm_wiki serve` against the build output) can query the index
        # without re-burning Codex tokens on every push. See
        # examples/demo-corpus/scripts/seed_raganything_store.py for how
        # the store is rebuilt locally.
        run: |
          mkdir -p .llm-wiki/external/raganything/working_dir
          cp -R examples/demo-corpus/raganything-store/. .llm-wiki/external/raganything/working_dir/
          echo "store size:"
          du -sh .llm-wiki/external/raganything/working_dir
          echo "doc count:"
          python -c "
          import json, pathlib
          p = pathlib.Path('.llm-wiki/external/raganything/working_dir/kv_store_doc_status.json')
          d = json.loads(p.read_text())
          processed = sum(1 for v in d.values() if v.get('status') == 'processed')
          print(f'  {processed}/{len(d)} docs processed')
          "

      - name: Seed demo agent sessions
        # Copy pre-converted demo session JSON into the harness session
        # store and re-stamp `project_root` to match the CI build's working
        # directory. Sessions whose project_root doesn't match are filtered
        # out by `session_matches_project()` before the renderer sees them,
        # so committed JSON with a baked-in dev-machine path won't appear
        # in /sessions/. The pre-conversion step under
        # examples/demo-corpus/scripts/convert_sessions.py produces the
        # harness-shaped JSON; this step rewrites the project_root field
        # to $GITHUB_WORKSPACE and copies the files into the store layout
        # HarnessSessionStore.list_sessions() expects (<root>/<harness>/*.json).
        run: |
          python <<'PY'
          import json, os, pathlib
          workspace = os.environ['GITHUB_WORKSPACE']
          src_root = pathlib.Path('examples/demo-corpus/.harness-sessions')
          dst_root = pathlib.Path('.llm-wiki/harness_sessions')
          dst_root.mkdir(parents=True, exist_ok=True)
          seeded = 0
          for src in sorted(src_root.rglob('*.json')):
              harness = src.parent.name
              dst_dir = dst_root / harness
              dst_dir.mkdir(parents=True, exist_ok=True)
              data = json.loads(src.read_text(encoding='utf-8'))
              data['project_root'] = workspace
              (dst_dir / src.name).write_text(
                  json.dumps(data, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
                  encoding='utf-8',
              )
              seeded += 1
              print(f'  re-stamped + seeded {harness}/{src.name}')
          print(f'\nseeded {seeded} sessions with project_root={workspace}')
          PY
          find .llm-wiki/harness_sessions -type f -name '*.json' | sort

      - name: Build static site
        run: python -m llm_wiki project build-site

      - name: Add a no-Jekyll marker and a banner file
        # GitHub Pages defaults to Jekyll processing; .nojekyll opts out so
        # files prefixed with `_` (none today, but possible for assets) ship.
        # The banner is a tiny notice so visitors land knowing the demo is
        # the dogfood compile of this repo's own source.
        run: |
          touch .llm-wiki/site/.nojekyll
          cat > .llm-wiki/site/DEMO.txt <<'TXT'
          This GitHub Pages deploy is LLM-Wiki compiled against its own source.
          The compile uses the default deterministic extractor (no LLM, no API
          keys). To compile your own project, see the project README.
          TXT

      - name: Upload site as workflow artifact (always available)
        # Independent of Pages. This artifact is downloadable from the
        # workflow run page even when Pages is not enabled.
        uses: actions/upload-artifact@v7
        with:
          name: llm-wiki-site
          path: .llm-wiki/site
          retention-days: 14

      - name: Upload seeded RAG-Anything store as workflow artifact
        # ~32 MB pre-seeded LightRAG store (entities + relations + vector
        # indices for the 85-doc demo corpus). Downloadable from the
        # workflow run page so anyone running `llm_wiki serve` locally
        # against this repo's `examples/demo-corpus/data/` tree gets a
        # populated /api/ask endpoint without re-burning Codex tokens.
        # Not bundled into the Pages deploy (which is static HTML only).
        uses: actions/upload-artifact@v7
        with:
          name: raganything-store
          path: examples/demo-corpus/raganything-store
          retention-days: 30

      # ---- The steps below try to publish to GitHub Pages. ----
      # They fail-soft when Pages is not yet enabled for the repo
      # (one-time manual setup: Settings → Pages → Source:
      # "GitHub Actions"). Until that, the build job still passes.

      - name: Configure Pages (non-fatal if Pages not yet enabled)
        id: configure_pages
        continue-on-error: true
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact (non-fatal)
        if: steps.configure_pages.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v5
        with:
          path: .llm-wiki/site

      - name: Notice when Pages is not enabled
        if: steps.configure_pages.outcome != 'success'
        run: |
          echo "::warning::GitHub Pages is not enabled for this repository."
          echo "::warning::Enable it once at: ${{ github.server_url }}/${{ github.repository }}/settings/pages"
          echo "::warning::Source: GitHub Actions. The build artifact 'llm-wiki-site' is downloadable above."

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Skip the deploy job entirely until the maintainer has enabled
    # Pages. The deploy will run on every subsequent push thereafter.
    # We probe via the REST API to avoid making the workflow red.
    if: github.repository_owner != ''
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check Pages enablement
        id: pages_status
        continue-on-error: true
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/pages")
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" != "200" ]; then
            echo "::warning::Pages site not yet provisioned (HTTP $status). Skipping deploy."
            echo "::warning::Enable at ${{ github.server_url }}/${{ github.repository }}/settings/pages"
            exit 0
          fi
          echo "Pages site exists; proceeding to deploy."

      - name: Deploy to Pages
        id: deployment
        if: steps.pages_status.outputs.status == '200'
        continue-on-error: true
        uses: actions/deploy-pages@v5
